AutoName: Droidbert
Description: |-
  Droidbert is a native Android comic reader for Dilbert.

  It loads comic images directly from the Daily Dilbert API instead of embedding
  a website, providing a cleaner and faster reading experience.
  For hosts without `api/comic.php`, it can automatically use legacy
  `get_comics.php` + `/comics/...` paths.

  Features:
  * Native image-first comic reader UI
  * Latest comic shortcut
  * Date picker and previous/next navigation
  * GIF comic decoding
  * Configurable API base URL in app settings


AutoName: Droidbert
Description: |-
  Droidbert is a focused Android WebView app for reading the daily Dilbert comic.

  It opens https://dilbert.xo.nl/ and hides search UI elements in the header
  to keep the comic as the primary reading surface.

  Features:
  * Full-screen comic view
  * Loading indicator while pages load
  * In-app back navigation
  * State restore on configuration changes


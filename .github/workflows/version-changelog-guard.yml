name: Version and Changelog Guard

on:
  pull_request:
    branches: ["main"]
  push:
    tags:
      - "v*"
  workflow_run:
    workflows: ["Release APK"]
    types: [completed]

jobs:
  changelog-on-version-change:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require changelog update when app version changes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          DIFF_FILES=$(git diff --name-only "$BASE" "$HEAD")

          if echo "$DIFF_FILES" | grep -q '^app/build.gradle.kts$'; then
            if ! echo "$DIFF_FILES" | grep -q '^CHANGELOG.md$'; then
              echo "CHANGELOG.md must be updated when app/build.gradle.kts changes."
              exit 1
            fi
          fi

      - name: Require Unreleased section in changelog
        run: |
          if ! grep -q '^## \[Unreleased\]' CHANGELOG.md; then
            echo "CHANGELOG.md must contain an [Unreleased] section."
            exit 1
          fi

  tag-matches-version:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure tag matches versionName and changelog entry
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION_NAME=$(grep -E 'versionName = "[0-9]+\.[0-9]+\.[0-9]+"' app/build.gradle.kts | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')

          if [ "$TAG" != "$VERSION_NAME" ]; then
            echo "Tag version ($TAG) does not match app versionName ($VERSION_NAME)."
            exit 1
          fi

          if ! grep -q "^## \[$TAG\]" CHANGELOG.md; then
            echo "CHANGELOG.md must contain a section for [$TAG]."
            exit 1
          fi

  release-apk-name-check:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify release APK name matches version
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG_REF: ${{ github.event.workflow_run.head_branch }}
        run: |
          TAG="${TAG_REF#v}"

          if [ -z "$TAG" ] || [ "$TAG" = "$TAG_REF" ]; then
            echo "Expected tag-like head branch (v<version>), got: $TAG_REF"
            exit 1
          fi

          EXPECTED_ASSET="droidbert-${TAG}.apk"
          RELEASE_API="repos/${REPO}/releases/tags/v${TAG}"

          for _ in $(seq 1 10); do
            if RELEASE_JSON=$(gh api "$RELEASE_API" 2>/dev/null); then
              break
            fi
            sleep 6
          done

          if [ -z "$RELEASE_JSON" ]; then
            echo "Could not retrieve release metadata for v${TAG}."
            exit 1
          fi

          ASSET_NAMES=$(gh api "$RELEASE_API" --jq '.assets[].name' 2>/dev/null || true)

          if ! printf '%s\n' "$ASSET_NAMES" | grep -Fxq "$EXPECTED_ASSET"; then
            echo "Expected APK asset not found: $EXPECTED_ASSET"
            echo "Available assets: ${ASSET_NAMES:-'(none)'}"
            exit 1
          fi

          echo "Verified APK asset name: $EXPECTED_ASSET"
